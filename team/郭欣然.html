<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>郭欣然 - 正向引力师资团队</title>
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #2d6a4f;
            --light: #f8f9fa;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--light); color: #333; line-height: 1.8; }
        
        .top-bar {
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            padding: 18px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .top-bar-inner { max-width: 1100px; margin: 0 auto; width: 100%; display: flex; align-items: center; justify-content: space-between; }
        .top-logo { color: white; font-size: 1.2rem; font-weight: 700; text-decoration: none; letter-spacing: 1px; }
        .back-link { color: rgba(255,255,255,0.8); text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
        .back-link:hover { color: white; text-decoration: underline; }

        .category-badge {
            display: inline-block;
            background: #2d6a4f;
            color: white;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 16px;
            letter-spacing: 1px;
        }

        .profile-card {
            max-width: 860px;
            margin: 40px auto 60px;
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 60px rgba(0,0,0,0.08);
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 40px;
            padding: 48px 50px 40px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
        }
        .profile-avatar img {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255,255,255,0.25);
            flex-shrink: 0;
        }
        .profile-info { flex: 1; }
        .profile-info h1 {
            font-size: 2.2rem;
            font-weight: 800;
            margin-bottom: 14px;
            letter-spacing: 2px;
        }
        .profile-short {
            color: rgba(255,255,255,0.85);
            font-size: 1rem;
            line-height: 1.7;
        }
        .profile-body {
            padding: 40px 50px 50px;
        }
        .profile-section { margin-bottom: 36px; }
        .profile-section h2 {
            font-size: 1.1rem;
            color: #2d6a4f;
            margin-bottom: 14px;
            font-weight: 700;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .profile-section h2::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #eee;
        }
        .profile-section p {
            color: #555;
            font-size: 1rem;
            line-height: 2;
        }

        footer {
            background: var(--primary);
            color: rgba(255,255,255,0.6);
            text-align: center;
            padding: 28px;
            font-size: 0.85rem;
        }
        footer a { color: rgba(255,255,255,0.8); text-decoration: none; }
        footer a:hover { text-decoration: underline; }

        @media (max-width: 640px) {
            .profile-header { flex-direction: column; text-align: center; padding: 30px; }
            .profile-body { padding: 28px 24px; }
            .top-bar { padding: 14px 20px; }
        }
    </style>
</head>
<body>
    <div class="top-bar">
        <div class="top-bar-inner">
            <a href="/" class="top-logo">正向引力</a>
            <a href="/" class="back-link">← 返回师资团队</a>
        </div>
    </div>

    <div class="profile-card">
        <div class="profile-header">
            <div class="profile-avatar">
                <img src="../images/team/08_郭欣然.webp" alt="郭欣然">
            </div>
            <div class="profile-info">
                <span class="category-badge">正念入企师资</span>
                <h1>郭欣然</h1>
                <p class="profile-short">北大心理与认知科学学院硕士，注册心理师，MIED认证师资，1500+小时咨询经验，2000+小时危机干预热线经验。</p>
            </div>
        </div>
        <div class="profile-body">
            <div class="profile-section">
                <h2>详细介绍</h2>
                <p>北京大学心理与认知科学学院硕士-应用心理学临床方向<br>中国心理学会注册系统注册心理师<br>情绪困扰的正念干预MIED认证师资<br><br>心理咨询师、EFT伴侣治疗师，有1500+小时咨询经验，2000+小时危机干预热线经验。曾任高校、医院心理咨询师；企业EAP课程讲师，青少年心理杂志专栏作者。</p>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2024 正向引力（济南）管理咨询有限公司 | <a href="/">team666.cn</a></p>
    </footer>
</body>
</html>
