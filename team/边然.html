<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>边然 - 正向引力师资团队</title>
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #e94560;
            --light: #f8f9fa;
            --gray: #6c757d;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif; background: var(--light); color: #333; line-height: 1.6; }
        .back-link {
            display: inline-block;
            padding: 20px 40px;
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }
        .back-link:hover { text-decoration: underline; }
        .profile-card {
            max-width: 900px;
            margin: 0 auto 60px;
            background: white;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 60px rgba(0,0,0,0.08);
        }
        .profile-header {
            display: flex;
            align-items: center;
            gap: 40px;
            padding: 50px 50px 40px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            color: white;
        }
        .profile-avatar img {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid rgba(255,255,255,0.3);
        }
        .profile-info h1 {
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 12px;
        }
        .profile-info .badge {
            display: inline-block;
            background: var(--accent);
            color: white;
            padding: 6px 16px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        .profile-body {
            padding: 40px 50px 50px;
        }
        .profile-section {
            margin-bottom: 32px;
        }
        .profile-section h2 {
            font-size: 1.2rem;
            color: var(--accent);
            margin-bottom: 12px;
            font-weight: 600;
        }
        .profile-section p {
            color: #555;
            font-size: 1.05rem;
            line-height: 1.8;
        }
        footer {
            background: var(--primary);
            color: rgba(255,255,255,0.7);
            text-align: center;
            padding: 30px;
            font-size: 0.9rem;
        }
        footer a { color: var(--accent); text-decoration: none; }
        @media (max-width: 600px) {
            .profile-header { flex-direction: column; text-align: center; padding: 30px; }
            .profile-body { padding: 30px; }
        }
    </style>
</head>
<body>
    <a href="/" class="back-link">← 返回师资团队</a>

    <div class="profile-card">
        <div class="profile-header">
            <div class="profile-avatar">
                <img src="../images/team/10_边然.webp" alt="边然">
            </div>
            <div class="profile-info">
                <h1>边然</h1>
                <span class="badge">师资团队</span>
            </div>
        </div>
        <div class="profile-body">
            <div class="profile-section">
                <h2>个人简介</h2>
                <p>北大心理与认知科学学院硕士+北外英语系硕博。前海淀六小强高中英语老师，MIED认证师资。</p>
            </div>
        </div>
    </div>

    <footer>
        <p>© 2024 正向引力（济南）管理咨询有限公司 | <a href="/">team666.cn</a></p>
    </footer>
</body>
</html>
